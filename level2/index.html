                    let chance = Math.random();

                    if (chance < 0.2){
                        coins = Math.max(0, coins - 20);//Math.max(0, coins - 20); - не дозволяє віднімати, щоб залиштвся від'ємний остаток монет
                        say("🔥 Пожежа на будівництві! - 20 монет");

                        } else if (chance < 0.4){
                            coins += 30;
                            say("🤝 Волонтерська допомога!<br> + 30 монет");
                        } else {    
                            say("🌞Молодець!<br>Будівництво йде за планом");
                        }   
                    }

                    }

                        let step = dialog[dialogStep];
                        
                        if(step.woman != ""){

                        document.getElementById("speech-woman").style.display = "block";
                        document.getElementById("speech-bilder").style.display = "none";

                        }else{

                        document.getElementById("speech-woman").style.display = "none";
